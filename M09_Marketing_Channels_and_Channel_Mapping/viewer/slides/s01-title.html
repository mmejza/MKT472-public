<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../slide-system.css">
<style>
.title-slide { background: var(--navy); width: var(--slide-w); height: var(--slide-h); display: flex; flex-direction: column; justify-content: center; padding: 56px 64px; position: relative; overflow: hidden; }
.title-slide::before { content: ''; position: absolute; right: -60px; top: -60px; width: 300px; height: 300px; border-radius: 50%; background: rgba(255,255,255,0.03); pointer-events: none; }
.title-slide::after { content: ''; position: absolute; left: 0; bottom: 0; width: 100%; height: 3px; background: linear-gradient(90deg, var(--accent) 0%, transparent 60%); }
.course-tag { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 24px; }
.mod-title { font-size: 38px; font-weight: 600; color: #fff; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 12px; }
.mod-sub { font-size: 17px; font-weight: 300; color: rgba(255,255,255,0.6); margin-bottom: 40px; letter-spacing: 0.01em; }
.mod-meta { display: flex; gap: 28px; }
.meta-item { display: flex; flex-direction: column; gap: 2px; }
.meta-label { font-family: 'IBM Plex Mono', monospace; font-size: 8.5px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
.meta-val { font-size: 12.5px; font-weight: 400; color: rgba(255,255,255,0.75); }
.read-warning { margin-top: 44px; padding: 12px 18px; background: rgba(200,135,26,0.15); border: 1px solid rgba(200,135,26,0.35); border-radius: 3px; font-size: 12px; font-weight: 400; color: var(--accent-lt); display: inline-block; }
</style>
</head><body>
<div class="title-slide">
  <div class="course-tag">MKT 472 · Module 09</div>
  <div class="mod-title">Marketing Channels<br>and Channel Mapping</div>
  <div class="mod-sub">How channel structure determines what you actually receive</div>
  <div class="mod-meta">
    <div class="meta-item"><span class="meta-label">Module</span><span class="meta-val">09 of 13</span></div>
    <div class="meta-item"><span class="meta-label">Chapter</span><span class="meta-val">9</span></div>
    <div class="meta-item"><span class="meta-label">Slides</span><span class="meta-val">19</span></div>
    <div class="meta-item"><span class="meta-label">Est. time</span><span class="meta-val">15–20 min</span></div>
  </div>
  <div class="read-warning">⚠ Read Chapter 9 before viewing this deck — Gate 1 has already tested you on chapter-only content</div>
</div>
</body></html>
