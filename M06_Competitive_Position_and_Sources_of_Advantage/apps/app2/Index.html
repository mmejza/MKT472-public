<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Industry Attractiveness Scorer</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<main class="app-shell">
		<header class="app-header">
			<h1>Industry Attractiveness Scorer</h1>
			<p>Scores represent attractiveness contribution after direction correction.</p>
			<div class="header-controls">
				<label for="preset-a">
					Preset A
					<select id="preset-a">
						<option value="">Select preset...</option>
						<option value="pharmaceutical">Pharmaceutical</option>
						<option value="personal-computer">Personal Computer</option>
					</select>
				</label>
				<label class="b-toggle">
					<input id="enable-b" type="checkbox">
					Enable Industry B Comparison
				</label>
			</div>
		</header>

		<section class="input-grid" aria-label="Industry inputs">
			<article class="industry-card" id="industry-a-card">
				<h2>Industry A (Primary)</h2>
				<label>
					Industry Name
					<input id="name-a" type="text" value="Industry A">
				</label>
				<div id="inputs-a" class="force-list"></div>
			</article>

			<article class="industry-card" id="industry-b-card" hidden>
				<div class="b-title-row">
					<h2>Industry B (Optional)</h2>
					<label for="preset-b">
						Preset B
						<select id="preset-b">
							<option value="">Select preset...</option>
							<option value="pharmaceutical">Pharmaceutical</option>
							<option value="personal-computer">Personal Computer</option>
						</select>
					</label>
				</div>
				<label>
					Industry Name
					<input id="name-b" type="text" value="">
				</label>
				<p id="name-b-prompt" class="helper-text"></p>
				<div id="inputs-b" class="force-list"></div>
			</article>
		</section>

		<section class="output-zone" aria-label="Output section">
			<h2>Outputs</h2>
			<div class="output-grid">
				<article class="result-card" id="result-a">
					<h3 id="title-a">Industry A</h3>
					<div class="iai-row">
						<span class="iai-label">IAI</span>
						<span class="iai-value" id="iai-a">0.0</span>
					</div>
					<span class="class-badge" id="class-a">Above Average</span>
					<p class="sum-line" id="sum-a"></p>
					<p class="recommendation" id="rec-a"></p>
					<canvas id="radar-a" width="360" height="360" aria-label="Industry A radar chart"></canvas>
				</article>

				<article class="result-card" id="result-b" hidden>
					<h3 id="title-b">Industry B</h3>
					<div class="iai-row">
						<span class="iai-label">IAI</span>
						<span class="iai-value" id="iai-b">0.0</span>
					</div>
					<span class="class-badge" id="class-b">Above Average</span>
					<p class="sum-line" id="sum-b"></p>
					<p class="recommendation" id="rec-b"></p>
					<canvas id="radar-b" width="360" height="360" aria-label="Industry B radar chart"></canvas>
				</article>
			</div>

			<article id="comparison-row" class="comparison-row" hidden>
				<h3>Industry Comparison</h3>
				<p id="compare-line"></p>
			</article>
		</section>
	</main>

	<script src="script.js"></script>
</body>
</html>
