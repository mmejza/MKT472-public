<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MKT 472 — M10 Slide Viewer</title>
<link rel="stylesheet" href="viewer.css">
</head>
<body>
<div id="topbar">
  <span class="course-id">MKT 472</span>
  <span class="mod-title">M10 · Marketing Communications, Social Media, and Customer Response</span>
  <span class="sl-count">Slides: <span id="sl-count-val">—</span></span>
</div>
<div id="main">
  <nav id="sidebar">
    <div id="sb-head">Module Slides</div>
    <div id="slide-list"></div>
  </nav>
  <div id="stage">
    <div id="slide-frame">
      <iframe id="slide-iframe" src="" title="Slide content"></iframe>
    </div>
  </div>
</div>
<div id="navbar">
  <button class="nav-btn" id="btn-prev" onclick="navPrev()" disabled>← Prev</button>
  <span id="sl-ind">— / —</span>
  <button class="nav-btn" id="btn-next" onclick="navNext()">Next →</button>
</div>
<script src="viewer.js"></script>
</body>
</html>
