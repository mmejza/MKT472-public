<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M11 App 2 - Strategy Performance Projector</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700;800&display=swap');

    :root {
      --navy:#0F2027; --teal:#0D9B87; --teal-dk:#0D7A6B;
      --teal-lt:#E5F5F3; --teal-bd:#C8E8E4; --amber:#E6A800;
      --amb-lt:#FFF8E6; --amb-bd:#F5D78A; --red:#C0392B;
      --red-lt:#FEF5F5; --red-bd:#F5BFBF; --text:#1A2E2C;
      --muted:#7A9896; --off:#F7FDFC; --bg:#F0F4F3;
      --white:#FFFFFF; --border:#E8F5F3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      line-height: 1.35;
    }

    .app-shell {
      width: min(1220px, 100%);
      margin: 0 auto;
      background: linear-gradient(180deg, var(--off) 0%, var(--white) 100%);
      min-height: 100vh;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .topbar {
      background: var(--navy);
      color: var(--white);
      padding: 12px 12px 10px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
      border-bottom: 3px solid var(--teal-dk);
    }

    .course-label {
      color: var(--teal);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .title {
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1;
      white-space: nowrap;
    }

    .top-actions {
      justify-self: end;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Barlow', sans-serif;
      cursor: pointer;
      transition: 0.15s ease;
      background: var(--teal);
      color: var(--white);
    }

    .btn:hover,
    .btn:focus-visible {
      background: var(--teal-dk);
      outline: none;
    }

    .btn.secondary {
      background: var(--white);
      color: var(--teal-dk);
      border-color: var(--teal-bd);
    }

    .btn.secondary:hover,
    .btn.secondary:focus-visible {
      background: var(--teal-lt);
    }

    .content {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .input-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    .panel {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .panel h3 {
      margin: 0 0 10px;
      font-size: 16px;
      color: var(--teal-dk);
      font-weight: 600;
    }

    .field-list {
      display: grid;
      gap: 8px;
    }

    .field-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 120px;
      gap: 8px;
      align-items: center;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    .field-row:first-child {
      border-top: none;
      padding-top: 0;
    }

    .field-label {
      font-size: 14px;
      font-weight: 500;
    }

    .hold-text {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    input[type="number"] {
      width: 100%;
      border: 1px solid var(--teal-bd);
      border-radius: 7px;
      height: 34px;
      padding: 6px 8px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--white);
    }

    input[type="number"]:focus {
      outline: 2px solid var(--teal-lt);
      border-color: var(--teal);
    }

    .suffix {
      color: var(--muted);
      font-size: 13px;
      min-width: 18px;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--white);
    }

    table {
      width: 100%;
      min-width: 920px;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      padding: 8px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      text-align: right;
      white-space: nowrap;
    }

    th:first-child,
    td:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      z-index: 1;
      background: var(--white);
    }

    thead tr:first-child th {
      background: #F9FDFC;
      color: var(--teal-dk);
      font-weight: 700;
      text-align: center;
      border-bottom: 1px solid var(--teal-bd);
    }

    thead tr:nth-child(2) th {
      background: #FBFEFD;
      color: var(--muted);
      font-weight: 600;
      text-align: center;
    }

    th.year3,
    td.year3 {
      background: #F2F9F8;
    }

    td.highlight-nmc {
      background: var(--teal-lt);
      color: var(--teal-dk);
      font-weight: 700;
    }

    td.highlight-low-eff {
      background: var(--red-lt);
      color: #7C2118;
      font-weight: 700;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .banner {
      border: 1px solid var(--amb-bd);
      background: var(--amb-lt);
      border-radius: 10px;
      color: #6A4F00;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
    }

    .banner[hidden] {
      display: none;
    }

    @media (min-width: 980px) {
      .input-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 767px) {
      .topbar {
        grid-template-columns: 1fr;
        justify-items: start;
      }

      .title {
        text-align: left;
        white-space: normal;
      }

      .top-actions {
        justify-self: start;
      }

      .field-row {
        grid-template-columns: minmax(0, 1fr) 110px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar" aria-label="Projector header">
      <div class="course-label">MKT 472 · Module 11</div>
      <div class="title">Strategy Performance Projector</div>
      <div class="top-actions">
        <button class="btn" id="presetBeta" type="button">Vantage Beta</button>
        <button class="btn secondary" id="resetBtn" type="button">Reset</button>
      </div>
    </header>

    <main class="content">
      <section class="input-grid" aria-label="Assumption inputs">
        <article class="panel">
          <h3>Base-Year Inputs</h3>
          <div class="field-list" id="baseInputs"></div>
        </article>

        <article class="panel">
          <h3>Offensive Plan Assumptions</h3>
          <div class="field-list" id="offInputs"></div>
        </article>

        <article class="panel">
          <h3>Defensive Plan Assumptions</h3>
          <div class="field-list" id="defInputs"></div>
        </article>
      </section>

      <section class="table-wrap" aria-label="Projection output table">
        <table>
          <thead>
            <tr>
              <th scope="col" rowspan="2">Metric</th>
              <th scope="col" colspan="4">Offensive Plan</th>
              <th scope="col" colspan="4">Defensive Plan</th>
            </tr>
            <tr>
              <th scope="col">Base Year</th>
              <th scope="col">Year 1</th>
              <th scope="col">Year 2</th>
              <th scope="col" class="year3">Year 3</th>
              <th scope="col">Base Year</th>
              <th scope="col">Year 1</th>
              <th scope="col">Year 2</th>
              <th scope="col" class="year3">Year 3</th>
            </tr>
          </thead>
          <tbody id="outputBody"></tbody>
        </table>
      </section>

      <section class="banner" id="paradoxBanner" hidden></section>
    </main>
  </div>

  <script>
    const YEARS = [0, 1, 2, 3];

    const defaultInputs = {
      baseDemand: 300,
      growthRate: 8,
      baseShare: 12,
      baseMargin: 40,
      baseMktgExp: 12,
      offensiveTargetShare: 15,
      offensiveMarginErosion: 1.2,
      offensiveMktgIncrease: 1.5,
      defensiveMarginErosion: 0.6,
      defensiveMktgAdjustment: 0
    };

    const betaPreset = {
      baseDemand: 400,
      growthRate: 15,
      baseShare: 10,
      baseMargin: 42,
      baseMktgExp: 10,
      offensiveTargetShare: 16,
      offensiveMarginErosion: 1.5,
      offensiveMktgIncrease: 2,
      defensiveMarginErosion: 0.5,
      defensiveMktgAdjustment: 0
    };

    const fieldSpecs = {
      base: [
        { key: 'baseDemand', label: 'Base-Year Market Demand ($M)', suffix: '' },
        { key: 'growthRate', label: 'Market Growth Rate (%/yr)', suffix: '%' },
        { key: 'baseShare', label: 'Current Market Share (%)', suffix: '%' },
        { key: 'baseMargin', label: 'Base-Year Gross Margin (%)', suffix: '%' },
        { key: 'baseMktgExp', label: 'Base-Year Mktg & Sales Exp (%)', suffix: '%' }
      ],
      off: [
        { key: 'offensiveTargetShare', label: 'Year-3 Target Share (%)', suffix: '%' },
        { key: 'offensiveMarginErosion', label: 'Annual Margin Erosion (%/yr)', suffix: '%' },
        { key: 'offensiveMktgIncrease', label: 'Annual Mktg Exp Increase (pp/yr)', suffix: 'pp' }
      ],
      def: [
        { key: 'baseShare', label: 'Hold Share at base rate, display only', suffix: '%', readOnlyText: true },
        { key: 'defensiveMarginErosion', label: 'Annual Margin Erosion (%/yr)', suffix: '%' },
        { key: 'defensiveMktgAdjustment', label: 'Mktg Exp Adjustment (pp/yr)', suffix: 'pp' }
      ]
    };

    const state = {
      inputs: structuredClone(defaultInputs),
      projections: null
    };

    const outputRows = [
      { key: 'demand', label: 'Market Demand' },
      { key: 'share', label: 'Market Share' },
      { key: 'sales', label: 'Sales Revenue' },
      { key: 'margin', label: 'Gross Margin %' },
      { key: 'mktg', label: 'Mktg & Sales Exp % / ($M)' },
      { key: 'nmc', label: 'NMC' },
      { key: 'ros', label: 'Marketing ROS' },
      { key: 'roi', label: 'Marketing ROI' }
    ];

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function toNumber(value) {
      const parsed = Number.parseFloat(value);
      return Number.isNaN(parsed) ? 0 : parsed;
    }

    function fmtDemand(value) {
      return `$${value.toFixed(2).replace(/\.00$/, '').replace(/(\.\d)0$/, '$1')}`;
    }

    function fmtDollarM(value) {
      return `$${value.toFixed(1)}M`;
    }

    function fmtPct(value) {
      return `${value.toFixed(1).replace(/\.0$/, '')}%`;
    }

    function fmtPct1(value) {
      return `${value.toFixed(1)}%`;
    }

    function computeProjection(plan) {
      const i = state.inputs;
      const growth = i.growthRate / 100;
      const baseShare = i.baseShare / 100;
      const targetShare = i.offensiveTargetShare / 100;
      const shareStep = (targetShare - baseShare) / 3;

      return YEARS.map((year) => {
        const demand = i.baseDemand * Math.pow(1 + growth, year);

        const share = plan === 'offensive'
          ? (baseShare + (shareStep * year))
          : baseShare;

        const sales = demand * share;

        const marginPct = plan === 'offensive'
          ? (i.baseMargin - (i.offensiveMarginErosion * year))
          : (i.baseMargin - (i.defensiveMarginErosion * year));
        const margin = marginPct / 100;

        const mktgPctDisplay = plan === 'offensive'
          ? (i.baseMktgExp + (i.offensiveMktgIncrease * year))
          : (i.baseMktgExp + (i.defensiveMktgAdjustment * year));
        const mktgPct = mktgPctDisplay / 100;

        const mktgDollars = sales * mktgPct;
        const nmc = (sales * margin) - mktgDollars;

        const ros = sales === 0 ? 0 : (nmc / sales) * 100;
        const roi = mktgDollars === 0 ? 0 : (nmc / mktgDollars) * 100;

        return {
          demand,
          share: share * 100,
          sales,
          margin: marginPct,
          mktgPct: mktgPctDisplay,
          mktgDollars,
          nmc,
          ros,
          roi
        };
      });
    }

    function recompute() {
      state.projections = {
        offensive: computeProjection('offensive'),
        defensive: computeProjection('defensive')
      };
      renderTable();
      renderParadox();
    }

    function td(content, classes = []) {
      const cell = document.createElement('td');
      if (classes.length) {
        cell.className = classes.join(' ');
      }
      cell.textContent = content;
      return cell;
    }

    function metricValue(rowKey, series, index) {
      const v = series[index];
      if (rowKey === 'demand') return fmtDemand(v.demand);
      if (rowKey === 'share') return fmtPct(v.share);
      if (rowKey === 'sales') return fmtDollarM(v.sales);
      if (rowKey === 'margin') return fmtPct(v.margin);
      if (rowKey === 'mktg') return `${fmtPct(v.mktgPct)} / ${fmtDollarM(v.mktgDollars)}`;
      if (rowKey === 'nmc') return fmtDollarM(v.nmc);
      if (rowKey === 'ros') return fmtPct(v.ros);
      return fmtPct(v.roi);
    }

    function renderTable() {
      const tbody = document.getElementById('outputBody');
      tbody.innerHTML = '';

      const off = state.projections.offensive;
      const def = state.projections.defensive;

      outputRows.forEach((row) => {
        const tr = document.createElement('tr');
        const label = document.createElement('td');
        label.textContent = row.label;
        tr.appendChild(label);

        YEARS.forEach((year) => {
          const classes = [];
          if (year === 3) classes.push('year3');

          if (row.key === 'nmc' && off[year].nmc > def[year].nmc) {
            classes.push('highlight-nmc');
          }
          if (row.key === 'ros' && off[year].ros < def[year].ros) {
            classes.push('highlight-low-eff');
          }
          if (row.key === 'roi' && off[year].roi < def[year].roi) {
            classes.push('highlight-low-eff');
          }

          tr.appendChild(td(metricValue(row.key, off, year), classes));
        });

        YEARS.forEach((year) => {
          const classes = [];
          if (year === 3) classes.push('year3');

          if (row.key === 'nmc' && def[year].nmc > off[year].nmc) {
            classes.push('highlight-nmc');
          }
          if (row.key === 'ros' && def[year].ros < off[year].ros) {
            classes.push('highlight-low-eff');
          }
          if (row.key === 'roi' && def[year].roi < off[year].roi) {
            classes.push('highlight-low-eff');
          }

          tr.appendChild(td(metricValue(row.key, def, year), classes));
        });

        tbody.appendChild(tr);
      });
    }

    function renderParadox() {
      const banner = document.getElementById('paradoxBanner');
      const y3off = state.projections.offensive[3];
      const y3def = state.projections.defensive[3];

      const paradoxActive = y3off.nmc > y3def.nmc && y3off.ros < y3def.ros;
      if (!paradoxActive) {
        banner.hidden = true;
        banner.textContent = '';
        return;
      }

      const nmcDelta = y3off.nmc - y3def.nmc;
      banner.textContent = `Efficiency Paradox Active: The offensive plan generates more total profit (NMC +${fmtDollarM(nmcDelta).replace('M', 'M at Year 3)')} but lower marketing efficiency (ROS ${fmtPct1(y3off.ros)} vs ${fmtPct1(y3def.ros)}, ROI ${Math.round(y3off.roi)}% vs ${Math.round(y3def.roi)}%). This is the expected trade-off for an Improve Position strategy in a growing market.`;
      banner.hidden = false;
    }

    function buildInputSection(rootId, specKey) {
      const root = document.getElementById(rootId);
      root.innerHTML = '';

      fieldSpecs[specKey].forEach((item) => {
        const row = document.createElement('div');
        row.className = 'field-row';

        const label = document.createElement('label');
        label.className = 'field-label';
        label.textContent = item.label;

        row.appendChild(label);

        if (item.readOnlyText) {
          const hold = document.createElement('div');
          hold.className = 'hold-text';
          hold.id = 'holdShareText';
          hold.textContent = `${fmtPct(state.inputs.baseShare)} (Current Share)`;
          row.appendChild(hold);
          root.appendChild(row);
          return;
        }

        const wrap = document.createElement('div');
        wrap.className = 'input-wrap';

        const input = document.createElement('input');
        input.type = 'number';
        input.step = '0.1';
        input.min = '0';
        input.max = '1000';
        input.value = state.inputs[item.key];
        input.dataset.key = item.key;
        input.setAttribute('aria-label', item.label);

        wrap.appendChild(input);

        const suffix = document.createElement('span');
        suffix.className = 'suffix';
        suffix.textContent = item.suffix;
        wrap.appendChild(suffix);

        row.appendChild(wrap);
        root.appendChild(row);
      });
    }

    function syncHoldShare() {
      const el = document.getElementById('holdShareText');
      if (el) {
        el.textContent = `${fmtPct(state.inputs.baseShare)} (Current Share)`;
      }
    }

    function wireInputs() {
      document.querySelectorAll('input[type="number"]').forEach((input) => {
        input.addEventListener('input', (event) => {
          const key = event.currentTarget.dataset.key;
          const value = toNumber(event.currentTarget.value);
          const normalized = key === 'baseDemand'
            ? clamp(value, 0, 100000)
            : clamp(value, -100, 1000);

          event.currentTarget.value = normalized;
          state.inputs[key] = normalized;
          syncHoldShare();
          recompute();
        });
      });
    }

    function renderInputs() {
      buildInputSection('baseInputs', 'base');
      buildInputSection('offInputs', 'off');
      buildInputSection('defInputs', 'def');
      wireInputs();
    }

    function applyPreset(presetValues) {
      state.inputs = structuredClone(presetValues);
      renderInputs();
      recompute();
    }

    function checkWithinTolerance(actual, expected, tolerance) {
      return Math.abs(actual - expected) <= tolerance;
    }

    function runAcceptanceChecks() {
      applyPreset(betaPreset);

      const y3off = state.projections.offensive[3];
      const y3def = state.projections.defensive[3];

      const checks = [
        ['Year-3 Offensive NMC', y3off.nmc, 20.9, 0.2],
        ['Year-3 Defensive NMC', y3def.nmc, 18.6, 0.2],
        ['Year-3 Offensive ROS', y3off.ros, 21.5, 0.3],
        ['Year-3 Defensive ROS', y3def.ros, 30.5, 0.3],
        ['Year-3 Offensive ROI', y3off.roi, 134, 1.5],
        ['Year-3 Defensive ROI', y3def.roi, 305, 1.5]
      ];

      checks.forEach(([name, actual, expected, tol]) => {
        if (!checkWithinTolerance(actual, expected, tol)) {
          console.error(`Acceptance check failed: ${name}. Expected ${expected}, got ${actual.toFixed(2)}`);
        }
      });

      const bannerVisible = !document.getElementById('paradoxBanner').hidden;
      if (!bannerVisible) {
        console.error('Acceptance check failed: Efficiency paradox banner not visible for Beta preset');
      }

      applyPreset(defaultInputs);
    }

    function init() {
      renderInputs();
      recompute();

      document.getElementById('presetBeta').addEventListener('click', () => applyPreset(betaPreset));
      document.getElementById('resetBtn').addEventListener('click', () => applyPreset(defaultInputs));

      runAcceptanceChecks();
    }

    init();
  </script>
</body>
</html>
